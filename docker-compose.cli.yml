services:
  ava-cli:
    build:
      context: .
      dockerfile: cli.Dockerfile
    container_name: ava-cli
    env_file:
      - .env
    environment:
      AVA_WORKSPACE_DIRS: /app;/app/data
      AVA_READONLY_DIRS: /app/docs;/app/.agent;/app/.opencode
    working_dir: /app
    # Como o cli.Dockerfile já possui ENTRYPOINT, enviaremos apenas o parametro padrão:
    command: ["--help"]
    volumes:
      # Monta o código do host (dev mode)
      - ./:/app
      # Protege os módulos instalados no contêiner
      - /app/node_modules
      # Banco de dados
      - ./sqlite_v2.db:/app/sqlite_v2.db
      # Mapeamento confidencial dos diretórios externos (dados e backup)
      - ../ava-assistant-v3-main-dados:/app/data
      - ../ava-assistant-v3-main-backup:/app/backup

  ava-cli-runtime:
    build:
      context: .
      dockerfile: cli.Dockerfile
    env_file:
      - .env
    environment:
      # Dentro do container, localhost aponta para o proprio container.
      # Para acessar Ollama no host Windows use host.docker.internal.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      AVA_WORKSPACE_DIRS: /app;/app/data
      AVA_READONLY_DIRS: /app/docs;/app/.agent;/app/.opencode
    user: "0:0"
    working_dir: /app
    command: ["--help"]
    volumes:
      # Runtime sem bind completo do projeto para evitar travamentos em "Creating"
      - ./sqlite_v2.db:/app/sqlite_v2.db
      - ../ava-assistant-v3-main-dados:/app/data
      - ../ava-assistant-v3-main-backup:/app/backup
